Name: harbour-plants
Summary: Identifying plants through image analysis
Version: 1.3.1
Release: 1.sfos
Group: Applications
License: MIT
URL: https://github.com/nephros/ut-plants
SCM: https://github.com/nephros/ut-plants
Sources:
    - '%{name}-%{version}.tar.gz'
#Patches:
#  - 'baz'
#SetupOptions: -q -n %{name}-%{version}/upstream
Macros:
  - 'orgname;s710'
  - 'appname;plants'
  - 'pkgname;%{name}'
  - 'plugindir;%{_datadir}/%{name}/'
  - |
    please;ignore this macro
    # add missing macros in case we want to use cmake_build/install
    %if 0%{?sailfishos_version} < 40600
    %if 0%{?sailfishos_version} <= 40000
    %define cmake_build %__cmake --build "."
    %define cmake_install %make_install
    %else
    %define cmake_build %__cmake --build "." -j8 --verbose
    %define cmake_install DESTDIR=%buildroot %__cmake --install .
    %endif
    %endif
#
Description: |
    %{summary}.

    This is a port of the Ubuntu Touch app "UT Plants" by Patrick Fial.

    The App enables the user to identify the species of a plant by submitting
    photos for identification. The identification result will contain the name
    of the species, common names (if known), and a score (percentage) of how
    accurate the identification was.  Identification results can be saved
    locally along with the photos which were used to identify the plant.

    For identification, the Pl@ntNet plant identification online service is
    used.

    In order to use the Pl@ntNet plant identification service, it is necessary
    to register at their website as developer and obtain an API-Key.  This key
    needs to be configured in the App settings.

Macros2:
    # undefine macros that may interfere with harbour:
  - |
    please_also;ignore this macro
    %if %{with harbour}
    %undefine vendor
    %undefine _vendor
    %undefine _chum
    %endif
    %if 0%{?harbour_validation:1}
    BuildRequires: sdk-harbour-rpmvalidator
    %endif
Check: true # so we can do a fake clean section below it

PkgBR:
  - cmake
  - intltool
  - sailfish-svg2png
  - qt5-qttools
  - qt5-qttools-linguist
PkgConfigBR:
  - sailfishapp
  - Qt5Core
  - Qt5Qml
  - Qt5Quick
  - Qt5DBus
  - nemothumbnailer-qt5
Configure: cmake
Builder: cmake
ConfigOptions:
  - '-Wno-dev'
  - '-DCMAKE_INSTALL_DATADIR=%{_datadir}'
  - '-DCMAKE_INSTALL_BINDIR=%{_bindir}'
  # '-DQT_IMPORTS_DIR=%{plugindir}'
NoAutoLocale: true
#LocaleName: '%{orgname}.%{appname}'
NoIconCache: true
Files:
  - '%{_bindir}/*'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/*/*/apps/%{name}.png'

