Name: harbour-plants
Summary: App for identifying plants through image analyzation
Version: 1.3.1
Release: 1.sfos
Group: Applications
License: MIT
URL: https://github.com/nephros/ut-plants
SCM: https://github.com/nephros/ut-plants
Sources:
    - '%{name}-%{version}.tar.gz'
#Patches:
#  - 'baz'
#SetupOptions: -q -n %{name}-%{version}/upstream
Macros:
  # keep .a files:
  # 'keepstatic;1'
  - 'orgname;s710'
  - 'appname;plants'
  - 'pkgname;%{name}'
  - 'plugindir;%{_datadir}/%{name}/'
# SFOS defaults to in_source_build 1
# - '__cmake_in_source_build;0'
# - '%_vpath_srcdir;.'
# - '%_vpath_builddir;%{_target_platform}'
# For meson:
# - '__meson_auto_features;disabled'
  - |
    please;ignore this macro
    # add missing macros in case we want to use cmake_build/install
    %if 0%{?sailfishos_version} < 40600
    %if 0%{?sailfishos_version} <= 40000
    %define cmake_build %__cmake --build "."
    %define cmake_install %make_install
    %else
    %define cmake_build %__cmake --build "." -j8 --verbose
    %define cmake_install DESTDIR=%buildroot %__cmake --install .
    %endif
    %endif
#
Description: |
    %{summary}.

    %if 0%{?_chum}
    Title: Plants
    Type: desktop-application
    DeveloperLogin: patrickjane
    Categories:
     - Science
     - Utility
    Custom:
      Repo: %{url}
    # GitHub:
    PackageIcon: %{url}/raw/branch/sfos/icons/%{name}-512.png
    Screenshots:
     - %{url}/raw/metadata/screenshots/screenshot1.png
     - %{url}/raw/metadata/screenshots/screenshot2.png
     - %{url}/raw/metadata/screenshots/screenshot3.png
    Links:
      Homepage: %{url}
      Help: %{url}/discussions
      Bugtracker: %{url}/issues
      Donation: https://openrepos.net/donate
    %endif

Macros2:
  # '__provides_exclude_from;%{plugindir}'
  #  if you need to exclude requires or provides:
  # '__provides_exclude_from;^%{app_arch_libdir}/.*$'
  # '__requires_exclude_from;^%{app_arch_libdir}/.*$'
  # '__requires_exclude;^%{_bindir}/%{name}-static'
  # '_noautoprov;libcrypto.so;libgcc_s.so;libmbed.*\\.so;libssl.so;libstdc\\+\\+.so;libpng12.so;libunwind.so'
  # '_noautoreqfiles;.*x86_64.*;.*/%{name}-static'
  # '_noautostrip;.*x86_64.*\\|.*/%{name}-static'
    # undefine macros that may interfere with harbour:
  - |
    please_also;ignore this macro
    %if %{with harbour}
    %undefine vendor
    %undefine _vendor
    %undefine _chum
    %endif
    %if 0%{?harbour_validation:1}
    BuildRequires: sdk-harbour-rpmvalidator
    %endif
Check: true # so we can do a fake clean section below it:

#Requires:
PkgBR:
  - cmake
  - intltool
  - sailfish-svg2png
  - qt5-qttools-linguist
PkgConfigBR:
  - sailfishapp
  - Qt5Core
  - Qt5Qml
  - Qt5Quick

#  - qml(Nemo.Notifications)
Configure: cmake
Builder: cmake
ConfigOptions:
  - '-DCMAKE_INSTALL_PREFIX=%{_datadir}'
  # '-DCMAKE_INSTALL_PREFIX=%{_prefix}'
  # '-DQT_IMPORTS_DIR=%{plugindir}'
#NoAutoLocale: true
LocaleName: '%{orgname}.%{appname}'
NoIconCache: true
#BuildArch: noarch
Files:
  # '%license LICENSE'
  # '%license COPYING'
  - '%{_bindir}/*'
  - '%{_datadir}/applications/%{name}.desktop'
  # '%{_datadir}/themes/sailfish-default/*/*/*.png'
  - '%{_datadir}/icons/*/*/apps/%{name}.png'
  # ' %{_datadir}/%{name}/'
  # ' %{_datadir}/%{name}'
  # '%dir %{_datadir}/%{name}/translations'
  # '%{_datadir}/%{name}/translations/*.qm'
  # '%{_datadir}/%{name}/qml/'
  # '%{_datadir}/%{name}/python/'

